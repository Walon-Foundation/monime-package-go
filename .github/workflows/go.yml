name: Go

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Verify modules
        run: go mod verify
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
